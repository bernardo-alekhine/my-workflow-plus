name: postgres-dev
services:
  db:
      image: postgres:16
      container_name: postgres-container
      env_file:
        - ../.env
      ports:
        - "5432:5432"
      volumes:
        # Mounts the named volume "pgvolume" to the PostgreSQL data directory in the container
        - pgvolume:/var/lib/postgresql/data
      restart: unless-stopped

volumes:
  pgvolume:
