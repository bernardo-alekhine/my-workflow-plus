name: my-workflow-plus
services:
  django_web:
    image: my-workflow-plus:v0.1.0
    container_name: django_web_container
    build:
      context: ../
      dockerfile: docker/Dockerfile
    env_file:
    - ../.env
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      # Mount the root folder to /app so changes reflect instantly
      - ../:/app
      # Prevents the container's logs folder from being overwritten by your host
      - logsvolume:/app/logs
    stdin_open: true
    tty: true 
    environment:
      - DJANGO_SETTINGS_MODULE=backend.config.settings
      - PYTHONUNBUFFERED=1
  db:
    image: postgres:16
    container_name: postgres-container
    profiles: ["dev"]
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      # Mounts the named volume "pgvolume" to the PostgreSQL data directory in the container
      - pgvolume:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgvolume:
  logsvolume:
