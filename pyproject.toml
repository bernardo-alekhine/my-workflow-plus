[tool.black]
line-length = 120

target-version = ["py312"]

include = "\.pyi?$"
extend-exclude = """
/(
    \.git

  | \.hg
  | \.mypy_cache
  | \.tox

  | \.venv
  | _build
  | buck-out

  | build
  | dist
)/
"""

[tool.mypy]
python_version = "3.12"
# Required for Django projects:
plugins = ["mypy_django_plugin.main"]
strict = true
exclude = [
    "node_modules",
    "__pycache__",
    ".venv",
    "migrations",
    "dist",
    "build"
]

[tool.mypy.plugins.django-stubs]
django_settings_module = "config.settings"

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
include = ["apps"]
exclude = ["**/node_modules", "**/__pycache__", ".venv", "migrations"]
